    /* ═══════════════════════════════════════════════════════
       BFS PERSONALITY MATCHING ENGINE
       ───────────────────────────────────────────────────────
       The user's quiz scores form a point in 5D trait-space.
       BFS explores outward from that point in discrete steps,
       visiting neighbouring trait combinations level-by-level
       until it lands on a node that matches an avatar archetype.

       Graph structure:
         Node   = { openness, conscientiousness, extraversion,
                    agreeableness, neuroticism }  (each 0-100)
         Edges  = 26 neighbours per node (±STEP in each dimension,
                   including diagonals in 5D)
         Goal   = any node within THRESHOLD distance of an avatar

       This is meaningful because:
       1. It guarantees the *closest* archetype is found, not just
          a greedy best-fit.
       2. The BFS frontier visualises how many "trait adjustments"
          away each archetype is — shown in the UI.
       3. It handles ambiguous answers better than raw scoring.
    ═══════════════════════════════════════════════════════ */

    const TRAITS = ["openness","conscientiousness","extraversion","agreeableness","neuroticism"];
    const BFS_STEP = 8;
    const BFS_THRESHOLD = 22;
    const MAX_BFS_LEVELS = 6;

    function euclidean(a, b) {
      return Math.sqrt(TRAITS.reduce((s, k) => s + (a[k] - b[k]) ** 2, 0));
    }

    function bfsNeighbours(node) {
      const neighbours = [];
      for (const k of TRAITS) {
        for (const delta of [-BFS_STEP, BFS_STEP]) {
          const next = { ...node, [k]: Math.max(0, Math.min(100, node[k] + delta)) };
          neighbours.push(next);
        }
      }
      return neighbours;
    }

    function nodeKey(node) {
      return TRAITS.map(k => Math.round(node[k] / BFS_STEP)).join(",");
    }

    function bfsMatch(userScores, avatars) {
      const start = { ...userScores };
      const queue = [{ node: start, level: 0, path: ["start"] }];
      const visited = new Set([nodeKey(start)]);
      let visitedCount = 0;

      while (queue.length > 0) {
        const { node, level, path } = queue.shift();
        visitedCount++;

        let bestAvatar = null;
        let bestDist = Infinity;
        for (const [key, av] of Object.entries(avatars)) {
          const d = euclidean(node, av.traits);
          if (d < bestDist) { bestDist = d; bestAvatar = key; }
        }

        if (bestDist <= BFS_THRESHOLD) {
          return { matched: bestAvatar, levels: level, visited: visitedCount, path, distance: Math.round(bestDist) };
        }

        if (level >= MAX_BFS_LEVELS) continue;

        for (const nb of bfsNeighbours(node)) {
          const key = nodeKey(nb);
          if (!visited.has(key)) {
            visited.add(key);
            const changedTrait = TRAITS.find(k => nb[k] !== node[k]);
            queue.push({ node: nb, level: level + 1, path: [...path, changedTrait] });
          }
        }
      }

      let bestAvatar = null, bestDist = Infinity;
      for (const [key, av] of Object.entries(avatars)) {
        const d = euclidean(userScores, av.traits);
        if (d < bestDist) { bestDist = d; bestAvatar = key; }
      }
      return { matched: bestAvatar, levels: MAX_BFS_LEVELS, visited: visitedCount, path: [], distance: Math.round(bestDist) };
    }

    function TraitBar({ value, color, label, pct, delay = 0 }) {
      const [w, setW] = useState(0);
      useEffect(() => { const t = setTimeout(() => setW(value), 120 + delay); return () => clearTimeout(t); }, [value]);
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>{label}</span>
            <span style={{ fontSize: 13, fontWeight: 700, color }}>{pct}</span>
          </div>
          <div style={{ height: 6, background: "rgba(255,255,255,.06)", borderRadius: 99, overflow: "hidden" }}>
            <div style={{ height: "100%", width: w + "%", background: color, borderRadius: 99, transition: "width .85s cubic-bezier(.4,0,.2,1)" }} />
          </div>
        </div>
      );
    }

    function ScaleBtn({ value, selected, onClick }) {
      return (

          width: 48, height: 48, borderRadius: "50%",
          border: selected ? `2px solid ${S.accent}` : `2px solid ${S.border}`,
          background: selected ? "rgba(124,92,252,.22)" : S.surface2,
          color: selected ? S.text : S.muted,
          fontFamily: "'Syne',sans-serif", fontSize: 15, fontWeight: 700,
          cursor: "pointer", transition: "all .18s",
          transform: selected ? "scale(1.18)" : "scale(1)"
        }}>{value}</button>
      );
    }

    /* ════════════════ BFS VISUALISER ════════════════ */
    function BFSVisualiser({ result, userScores }) {
      if (!result) return null;
      const { levels, visited, distance, path, matched } = result;

      const traitColors = {
        openness: S.accent, conscientiousness: S.accent2,
        extraversion: S.green, agreeableness: S.accent4, neuroticism: S.accent3, start: S.muted
      };

      const avDists = Object.entries(AVATARS).map(([k, av]) => ({
        key: k, av, dist: Math.round(euclidean(userScores, av.traits))
      })).sort((a, b) => a.dist - b.dist);

      return (
        <div style={{
          background: "rgba(124,92,252,.06)", border: `1px solid rgba(124,92,252,.18)`,
          borderRadius: 16, padding: "22px 24px", marginTop: 20
        }} className="fade-up">
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <span style={{ fontSize: 18 }}>🔬</span>
            <div>
              <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 13, fontWeight: 700, color: S.accent }}>
                BFS Algorithm — Trait-Space Exploration
              </div>
              <div style={{ fontSize: 11, color: S.muted, marginTop: 2 }}>
                Explored <strong style={{ color: S.text }}>{visited}</strong> trait-nodes across{" "}
                <strong style={{ color: S.text }}>{levels}</strong> BFS levels — matched in{" "}
                <strong style={{ color: S.accent }}>{distance} units</strong> distance
              </div>
            </div>
          </div>

          {path.length > 1 && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginBottom: 18 }}>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".1em", color: S.muted, textTransform: "uppercase" }}>Path:</span>
              {path.map((step, i) => (
                <span key={i} style={{
                  fontSize: 10, fontWeight: 700, padding: "3px 9px", borderRadius: 20,
                  background: `${traitColors[step] || S.muted}18`,
                  border: `1px solid ${traitColors[step] || S.muted}44`,
                  color: traitColors[step] || S.muted,
                  animation: `bfsNode .35s ${i * 0.07}s both`
                }}>{step === "start" ? "📍 start" : step}</span>
              ))}
            </div>
          )}

          <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: ".12em", color: S.muted, textTransform: "uppercase", marginBottom: 10 }}>
            BFS Distance to Each Archetype
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
            {avDists.map(({ key, av, dist }, i) => {
              const isMatch = key === matched;
              const barW = Math.max(8, 100 - dist);
              return (
                <div key={key} style={{
                  background: isMatch ? "rgba(124,92,252,.14)" : S.surface2,
                  border: `1px solid ${isMatch ? "rgba(124,92,252,.4)" : S.border}`,
                  borderRadius: 10, padding: "10px 12px",
                  animation: `bfsNode .4s ${i * 0.06}s both`
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontSize: 13 }}>{av.emoji}</span>
                    {isMatch && <span style={{ fontSize: 9, fontWeight: 700, color: S.accent, background: "rgba(124,92,252,.18)", padding: "2px 7px", borderRadius: 20, border: `1px solid rgba(124,92,252,.35)` }}>MATCHED</span>}
                  </div>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 11, fontWeight: 700, marginBottom: 3 }}>{av.name}</div>
                  <div style={{ fontSize: 10, color: S.muted, marginBottom: 6 }}>dist: {dist}</div>
                  <div style={{ height: 3, background: "rgba(255,255,255,.05)", borderRadius: 99 }}>
                    <div style={{
                      height: "100%", width: barW + "%", borderRadius: 99,
                      background: isMatch ? `linear-gradient(90deg,${S.accent},${S.accent2})` : "rgba(255,255,255,.15)",
                      transition: "width .8s ease"
                    }} />
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(255,255,255,.03)", borderRadius: 10, fontSize: 11, color: S.muted, lineHeight: 1.7 }}>
            <strong style={{ color: S.text }}>How BFS works here:</strong> Your trait scores form a point in 5-dimensional space.
            BFS expands outward in steps of ±{BFS_STEP} per trait, visiting {Math.pow(10, 1).toFixed(0)}+ neighbour nodes per level,
            until it finds an archetype within threshold distance {BFS_THRESHOLD}. This guarantees the <em style={{ color: S.accent }}>nearest archetype</em> is found — not just a greedy best-fit.
          </div>
        </div>

    }

    /* ═══════════════════ MAIN APP ═══════════════════ */

    function MirrorAI() {
      const [page, setPage] = useState("dashboard");
      const [currentAvatar, setCurrentAvatar] = useState(null);
      const [currentProfile, setCurrentProfile] = useState(null);
      const [historyLog, setHistoryLog] = useState([]);
      const [bfsResult, setBfsResult] = useState(null);

      const [currentQ, setCurrentQ] = useState(0);
      const [quizAnswers, setQuizAnswers] = useState({});

      const [qqCurrent, setQqCurrent] = useState(0);
      const [qqAnswers, setQqAnswers] = useState({});
      const [showAffirmation, setShowAffirmation] = useState(false);
      const [quickResult, setQuickResult] = useState(null);

      const [journalText, setJournalText] = useState("");
      const [journalAnalysis, setJournalAnalysis] = useState(null);

      const [histFilter, setHistFilter] = useState("all");
      const [histSearch, setHistSearch] = useState("");

      const [toast, setToast] = useState(null);
      const toastRef = useRef(null);

      function showToast(msg) {
        setToast(msg);
        clearTimeout(toastRef.current);
        toastRef.current = setTimeout(() => setToast(null), 2800);
      }

      function navigate(p) {
        setPage(p);
        if (p === "quiz") { setCurrentQ(0); setQuizAnswers({}); }
        if (p === "quicktest") { setQqCurrent(0); setQqAnswers({}); setShowAffirmation(false); setQuickResult(null); }
      }

      function nowTime() {
        return new Date().toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
      }

      function computeScoresFromAnswers(answers, questions) {
        const scores = { openness: 50, conscientiousness: 50, extraversion: 50, agreeableness: 50, neuroticism: 50 };
        const counts = { openness: 0, conscientiousness: 0, extraversion: 0, agreeableness: 0, neuroticism: 0 };
        questions.forEach((q, i) => {
          const key = q.trait?.toLowerCase() || "openness";
          if (scores[key] !== undefined) {
            scores[key] += ((answers[i] || 3) - 1) * 12.5;
            counts[key]++;
          }
        });
        for (const k in scores) scores[k] = Math.min(97, Math.max(20, Math.round(scores[k])));
        return scores;
      }

      function applyAvatarToGlobal(avKey, avData, bfs, histEntry) {
        setCurrentAvatar(avKey);
        setCurrentProfile(avData);
        setBfsResult(bfs);
        setHistoryLog(prev => {
          const next = [{ ...histEntry, date: new Date() }, ...prev];
          return next;
        });
        showToast(`${avData.emoji} ${avData.name} · ${avData.mbti} — BFS matched in ${bfs.levels} levels!`);
      }

      function finishQuiz() {
        const userScores = computeScoresFromAnswers(quizAnswers, QUIZ_QUESTIONS);
        const bfs = bfsMatch(userScores, AVATARS);
        const av = AVATARS[bfs.matched];
        const merged = {};
        for (const k of TRAITS) merged[k] = Math.round((av.traits[k] + userScores[k]) / 2);
        const result = { ...av, traits: merged };
        applyAvatarToGlobal(bfs.matched, result, bfs, {
          type: "quiz", icon: "📋", badgeClass: "quiz", badgeLabel: "Quiz",
          title: "Personality Quiz", meta: nowTime() + " · 10 questions · BFS matched",
          mbti: av.mbti, trait: av.dominant, traitPct: merged[av.dominant.toLowerCase()] || av.dominantPct
        });
        setPage("profile");
      }

      function finishQuickTest() {
        const vals = Object.values(qqAnswers);
        const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 3;
        const userScores = {
          openness: avg >= 3.5 ? 80 : 50,
          conscientiousness: avg >= 3.0 ? 65 : 45,
          extraversion: avg <= 2.5 ? 35 : 60,
          agreeableness: avg >= 3.5 ? 82 : 55,
          neuroticism: avg >= 4.0 ? 60 : 38
        };
        const bfs = bfsMatch(userScores, AVATARS);
        const av = AVATARS[bfs.matched];
        setQuickResult({ av, bfs });
        setShowAffirmation(true);
        applyAvatarToGlobal(bfs.matched, av, bfs, {
          type: "quick", icon: "⚡", badgeClass: "quick", badgeLabel: "Quick Test",
          title: "5-Min Mirror Check", meta: nowTime() + " · 5 questions · BFS matched",
          mbti: av.mbti, trait: av.dominant, traitPct: av.dominantPct
        });
      }

      function analyseJournal() {
        const text = journalText.trim();
        if (text.length < 40) { showToast("✏️ Please write a bit more — aim for 50+ words!"); return; }
        const lower = text.toLowerCase();
        const sc = { openness: 50, conscientiousness: 50, extraversion: 50, agreeableness: 50, neuroticism: 50 };
        if (/wonder|imagine|dream|creat|art|beauty|explor|curious|discover|inspir|new|learn|read/.test(lower)) sc.openness += 22;
        if (/plan|goal|work|focus|organis|accomplish|finish|deadline|schedule|responsib|complet/.test(lower)) sc.conscientiousness += 22;
        if (/friend|party|talk|laugh|social|people|fun|energy|excit|crowd|meet|gather/.test(lower)) sc.extraversion += 22;
        if (/alone|quiet|tired|exhaust|solitud|peace|rest|recharge|introvert/.test(lower)) sc.extraversion -= 15;
        if (/care|help|kind|love|family|grateful|hug|support|understand|listen|compas/.test(lower)) sc.agreeableness += 22;
        if (/anxious|worry|stress|fear|sad|overwhelm|cry|upset|nervous|fail|lost|mistak/.test(lower)) sc.neuroticism += 22;
        if (/calm|peace|happy|joy|content|relax|grateful|fine|good|okay|bliss/.test(lower)) sc.neuroticism -= 12;
        for (const k in sc) sc[k] = Math.min(97, Math.max(20, sc[k]));
        const bfs = bfsMatch(sc, AVATARS);
        const av = AVATARS[bfs.matched];
        const merged = {};
        for (const k of TRAITS) merged[k] = Math.round((av.traits[k] + sc[k]) / 2);
        setJournalAnalysis({ av: { ...av, traits: merged }, bfs, userScores: sc });
      }

      function saveJournalAndGoToProfile() {
        if (!journalAnalysis) return;
        const { av, bfs } = journalAnalysis;
        const words = journalText.trim().split(/\s+/).length;
        applyAvatarToGlobal(bfs.matched, av, bfs, {
          type: "journal", icon: "📓", badgeClass: "journal", badgeLabel: "Journal",
          title: "Journal Entry", meta: nowTime() + " · " + words + " words · BFS matched",
          mbti: av.mbti, trait: av.dominant, traitPct: av.traits[av.dominant.toLowerCase()] || av.dominantPct
        });
        setJournalText(""); setJournalAnalysis(null);
        setPage("profile");
      }

      function selectAvatar(key) {
        const av = AVATARS[key];
        const bfs = bfsMatch(av.traits, AVATARS);

                        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 28, fontWeight: 800, color: s.color, marginBottom: 5 }}>{s.value}</div>
                        <div style={{ fontSize: 11, color: S.muted }}>{s.sub}</div>
                      </div>

                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1.4fr", gap: 14, marginBottom: 22 }}>

                            <div style={{ fontSize: 11, color: S.muted }}>{e.mbti} · {e.traitPct}% {e.trait}</div>
                          </div>
                        ))}
                      </div>

                  </div>
                </div>

                  </div>
                  <div style={{ marginBottom: 32 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: S.muted, marginBottom: 10 }}>
                      <span>Question {currentQ + 1} of {QUIZ_QUESTIONS.length}</span>
                      <span>{Math.round((currentQ + 1) / QUIZ_QUESTIONS.length * 100)}% complete</span>

                    <div style={{ height: 4, background: "rgba(255,255,255,.07)", borderRadius: 99 }}>

                    </div>
                  </div>
                  <div style={{ background: S.surface, border: `1px solid ${S.border}`, borderRadius: 20, padding: 34, marginBottom: 18 }}>

                    <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                      {[1, 2, 3, 4, 5].map(v => <ScaleBtn key={v} value={v} selected={quizAnswers[currentQ] === v} onClick={val => setQuizAnswers(a => ({ ...a, [currentQ]: val }))} />)}
                    </div>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <button onClick={() => setCurrentQ(q => Math.max(0, q - 1))} style={{ background: S.surface2, border: `1px solid ${S.border}`, color: S.muted, padding: "10px 22px", borderRadius: 10, fontFamily: "'Syne',sans-serif", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>← Previous</button>
                    <button onClick={() => { if (currentQ < QUIZ_QUESTIONS.length - 1) setCurrentQ(q => q + 1); else finishQuiz(); }}
                      style={{ background: `linear-gradient(135deg,${S.accent},${S.accent2})`, border: "none", color: "white", padding: "11px 28px", borderRadius: 10, fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                      {currentQ === QUIZ_QUESTIONS.length - 1 ? "Run BFS Match ✦" : "Next Question →"}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ═══ QUICK TEST ═══ */}
            {page === "quicktest" && (
              <div className="fade-up">
                <div style={{ padding: "20px 30px", background: S.surface, borderBottom: `1px solid ${S.border}`, position: "sticky", top: 0, zIndex: 10 }}>
                  <span style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800 }}>5-Min Mirror Check ⚡</span>
                </div>
                <div style={{ maxWidth: 700, margin: "0 auto", padding: "36px 30px" }}>
                  <div style={{ background: "rgba(252,92,156,.08)", border: `1px solid rgba(252,92,156,.2)`, borderRadius: 12, padding: "12px 18px", marginBottom: 24, fontSize: 12, fontWeight: 600, color: S.accent2 }}>
                    ⚡ Quick Check — 5 questions · instant BFS match + personal affirmation
                  </div>
                  {!showAffirmation ? (
                    <>
                      <div style={{ marginBottom: 28 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: S.muted, marginBottom: 10 }}>

                          <span>{Math.round((qqCurrent + 1) / QUICK_QUESTIONS.length * 100)}% complete</span>
                        </div>
                        <div style={{ height: 4, background: "rgba(255,255,255,.07)", borderRadius: 99 }}>

                        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: S.accent2, textTransform: "uppercase", marginBottom: 12 }}>Question {QUICK_QUESTIONS[qqCurrent].n} · Quick Reflection</div>
                        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 19, fontWeight: 700, lineHeight: 1.55, marginBottom: 30 }}>{QUICK_QUESTIONS[qqCurrent].text}</div>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: S.muted, marginBottom: 10 }}><span>Strongly Disagree</span><span>Strongly Agree</span></div>
                        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                          {[1, 2, 3, 4, 5].map(v => <ScaleBtn key={v} value={v} selected={qqAnswers[qqCurrent] === v} onClick={val => setQqAnswers(a => ({ ...a, [qqCurrent]: val }))} />)}
                        </div>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <button onClick={() => setQqCurrent(q => Math.max(0, q - 1))} style={{ background: S.surface2, border: `1px solid ${S.border}`, color: S.muted, padding: "10px 22px", borderRadius: 10, fontFamily: "'Syne',sans-serif", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>← Previous</button>
                        <button onClick={() => { if (qqCurrent < QUICK_QUESTIONS.length - 1) setQqCurrent(q => q + 1); else finishQuickTest(); }}
                          style={{ background: `linear-gradient(135deg,${S.accent2},${S.accent})`, border: "none", color: "white", padding: "11px 28px", borderRadius: 10, fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>

                      <div style={{ fontSize: 48, marginBottom: 14 }}>{quickResult.av.emoji}</div>

                      <div style={{ fontSize: 14, color: S.muted, marginBottom: 20 }}>{quickResult.av.name} · BFS matched in {quickResult.bfs.levels} levels, {quickResult.bfs.visited} nodes</div>

                      <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 16, fontWeight: 700, lineHeight: 1.6, marginBottom: 22 }}>{quickResult.av.affirmation}</div>
                      <button onClick={() => navigate("profile")} style={{ background: `linear-gradient(135deg,${S.accent},${S.accent2})`, border: "none", color: "white", padding: "13px 32px", borderRadius: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer", width: "100%" }}>See My Full Profile →</button>
                    </div>

                </div>

                </div>
                <div style={{ maxWidth: 700, margin: "0 auto", padding: "36px 30px" }}>
                  <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 26, fontWeight: 800, marginBottom: 10 }}>Write freely. We listen. ✦</h2>
                  <p style={{ fontSize: 14, color: S.muted, lineHeight: 1.75, marginBottom: 24 }}>Write today's journal entry in your own words. Our BFS algorithm explores your word patterns to find your nearest personality archetype in trait-space.</p>

                    style={{ width: "100%", background: S.surface, border: `1px solid ${S.border}`, borderRadius: 14, padding: 18, color: S.text, fontFamily: "'DM Sans',sans-serif", fontSize: 14, resize: "vertical", outline: "none", lineHeight: 1.75 }} />

                  </div>

                    <div className="fade-up" style={{ background: S.surface, border: `1px solid rgba(124,92,252,.22)`, borderRadius: 16, padding: 24, marginTop: 22 }}>

                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
                        <div>
                          <div style={{ fontSize: 11, color: S.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: ".08em" }}>Detected Type</div>
                          <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 28, fontWeight: 800, color: S.accent }}>{journalAnalysis.av.mbti}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 11, color: S.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: ".08em" }}>BFS Info</div>
                          <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 14, fontWeight: 700, color: S.accent2 }}>Level {journalAnalysis.bfs.levels} · {journalAnalysis.bfs.visited} nodes</div>
                        </div>
                      </div>
                      <div style={{ fontSize: 13, color: S.muted, lineHeight: 1.75, marginBottom: 18 }}>{journalAnalysis.av.strength}</div>
                      <BFSVisualiser result={journalAnalysis.bfs} userScores={journalAnalysis.userScores} />
                      <button onClick={saveJournalAndGoToProfile} style={{ width: "100%", background: `linear-gradient(135deg,${S.accent},${S.accent2})`, border: "none", color: "white", padding: 13, borderRadius: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer", marginTop: 18 }}>

                  <span style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800 }}>My Profile</span>
                </div>
                <div style={{ padding: "26px 30px" }}>
                  {!profile ? (
                    <div style={{ textAlign: "center", padding: "60px 0", color: S.muted }}>
                      <div style={{ fontSize: 48, marginBottom: 16 }}>🪞</div>

                      <div style={{ borderRadius: 20, padding: "36px 40px", marginBottom: 22, background: "linear-gradient(135deg,#1A1230 0%,#0F0F1A 60%,#1A1020 100%)", border: `1px solid rgba(124,92,252,.2)`, position: "relative", overflow: "hidden" }}>

                            <div style={{ fontSize: 15, color: S.muted, marginBottom: 14 }}>{profile.mbtiLabel}</div>
                            <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                              {profile.tags.map(t => <span key={t} style={{ fontSize: 11, fontWeight: 600, padding: "5px 12px", borderRadius: 20, border: `1px solid rgba(255,255,255,.1)`, color: S.muted }}>{t}</span>)}
                            </div>
                            {bfsResult && <div style={{ marginTop: 12, fontSize: 11, color: S.accent, fontWeight: 600 }}>🔬 BFS matched in {bfsResult.levels} levels · {bfsResult.visited} nodes explored · distance {bfsResult.distance}</div>}
                          </div>
                        </div>
                      </div>

                      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 22 }}>
                        {[
                          { icon: "🎯", title: "Core Strength", text: profile.strength },
                          { icon: "🌱", title: "Growth Edge",   text: profile.growth },
                          { icon: "💼", title: "Career Fit",    text: profile.career },
                        ].map(c => (
                          <div key={c.title} style={{ background: S.surface, border: `1px solid ${S.border}`, borderRadius: 16, padding: 22 }}>
                            <div style={{ fontSize: 24, marginBottom: 10 }}>{c.icon}</div>
                            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 14, fontWeight: 700, marginBottom: 6 }}>{c.title}</div>
                            <div style={{ fontSize: 12, color: S.muted, lineHeight: 1.75 }}>{c.text}</div>
                          </div>
                        ))}
                      </div>

                      <div style={{ background: S.surface, border: `1px solid ${S.border}`, borderRadius: 16, padding: 26, marginBottom: 22 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".14em", color: S.muted, textTransform: "uppercase", marginBottom: 20 }}>Big Five Deep Dive</div>
                        {TRAITS.map((t, i) => (
                          <TraitBar key={t} label={t.charAt(0).toUpperCase() + t.slice(1)} value={profile.traits[t]} pct={profile.traits[t] + "%"}
                            color={[S.accent, S.accent2, S.green, S.accent4, S.accent3][i]} delay={i * 100} />
                        ))}
                      </div>

                      {bfsResult && <BFSVisualiser result={bfsResult} userScores={profile.traits} />}
                    </>
                  )}
                </div>
              </div>
            )}

            {/* ═══ HISTORY ═══ */}
            {page === "history" && (
              <div className="fade-up">
                <div style={{ padding: "20px 30px", background: S.surface, borderBottom: `1px solid ${S.border}`, position: "sticky", top: 0, zIndex: 10 }}>
                  <span style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800 }}>History</span>
                </div>
                <div style={{ padding: "26px 30px" }}>
                  <div style={{ display: "flex", gap: 10, marginBottom: 22, flexWrap: "wrap", alignItems: "center" }}>
                    {["all","quiz","journal","quick"].map(f => (
                      <button key={f} onClick={() => setHistFilter(f)} style={{
                        padding: "8px 16px", borderRadius: 99, border: `1px solid ${histFilter === f ? "rgba(124,92,252,.5)" : S.border}`,
                        background: histFilter === f ? "rgba(124,92,252,.12)" : S.surface,
                        color: histFilter === f ? S.accent : S.muted, fontSize: 12, fontWeight: 600, cursor: "pointer"
                      }}>{f.charAt(0).toUpperCase() + f.slice(1)}</button>
                    ))}
                    <input value={histSearch} onChange={e => setHistSearch(e.target.value.toLowerCase())} placeholder="🔍  Search analyses…"
                      style={{ marginLeft: "auto", background: S.surface, border: `1px solid ${S.border}`, borderRadius: 10, padding: "8px 16px", color: S.text, fontSize: 13, fontFamily: "'DM Sans',sans-serif", outline: "none", width: 200 }} />
                  </div>
                  {historyLog.filter(e => (histFilter === "all" || e.type === histFilter) && (!histSearch || JSON.stringify(e).toLowerCase().includes(histSearch))).length === 0 ? (
                    <div style={{ textAlign: "center", padding: 48, color: S.muted }}><div style={{ fontSize: 36, marginBottom: 12 }}>◷</div>No analyses yet!</div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {historyLog.filter(e => (histFilter === "all" || e.type === histFilter) && (!histSearch || JSON.stringify(e).toLowerCase().includes(histSearch))).map((e, i) => {
                        const typeColor = { quiz: S.accent, journal: S.accent3, quick: S.accent2 };
                        return (
                          <div key={i} style={{ background: S.surface, border: `1px solid ${S.border}`, borderRadius: 14, padding: "18px 22px", display: "grid", gridTemplateColumns: "48px 1fr auto", alignItems: "center", gap: 18, cursor: "pointer", transition: "all .18s" }}>
                            <div style={{ width: 48, height: 48, borderRadius: 12, background: `rgba(124,92,252,.12)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{e.icon}</div>
                            <div>
                              <div style={{ fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 20, background: "rgba(124,92,252,.18)", color: S.accent, display: "inline-block", marginBottom: 5 }}>{e.badgeLabel}</div>
                              <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 14, fontWeight: 700, marginBottom: 3 }}>{e.title}</div>
                              <div style={{ fontSize: 12, color: S.muted }}>{e.meta}</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 18, fontWeight: 800, color: typeColor[e.type] || S.accent }}>{e.mbti}</div>
                              <div style={{ fontSize: 11, color: S.muted }}>{e.traitPct}% {e.trait}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ═══ COMING SOON ═══ */}
            {page === "coming" && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 14, minHeight: "70vh", textAlign: "center", padding: 30 }}>
                <div style={{ fontSize: 54 }}>🚧</div>
                <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 24, fontWeight: 800 }}>Coming Soon</div>
                <div style={{ color: S.muted }}>We're building something amazing. Check back soon!</div>
                <button onClick={() => navigate("dashboard")} style={{ background: `linear-gradient(135deg,${S.accent},${S.accent2})`, border: "none", color: "white", padding: "12px 28px", borderRadius: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, cursor: "pointer", marginTop: 8 }}>← Back to Dashboard</button>
              </div>
            )}

          </main>

          {/* Toast */}
          {toast && (
            <div style={{
              position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)",
              background: S.surface, border: `1px solid rgba(124,92,252,.4)`,
              borderRadius: 14, padding: "14px 22px", fontSize: 13, fontWeight: 600, color: S.text,
              zIndex: 999, whiteSpace: "nowrap", animation: "fadeUp .4s ease both",
              boxShadow: "0 8px 32px rgba(0,0,0,.4)"
            }}>{toast}</div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MirrorAI />);
  </script>
</body>
</html>
